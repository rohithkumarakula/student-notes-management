{% extends "base.html" %}

{% block content %}

<h2>📚 View Notes</h2>

<form action="/search" method="GET" class="mb-3">

    <input
        type="text"
        name="search"
        class="form-control"
        placeholder="Search by Title">

    <button class="btn btn-primary mt-2">
        Search
    </button>

</form>

<table class="table table-bordered mt-4">

    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Subject</th>
        <th>PDF</th>
        <th>Action</th>
    </tr>

    {% for note in notes %}

    <tr>
        <td>{{ note[0] }}</td>
        <td>{{ note[1] }}</td>
        <td>{{ note[2] }}</td>

        <td>
            <a href="/download/{{ note[3] }}" class="btn btn-success btn-sm">
                Download
            </a>
        </td>

        <td>
            <a href="/delete/{{ note[0] }}" class="btn btn-danger btn-sm">
                Delete
            </a>
        </td>

    </tr>

    {% endfor %}

</table>

<a href="/upload" class="btn btn-primary">
    Upload More Notes
</a>

{% endblock %}
